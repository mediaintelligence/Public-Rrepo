<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Agent - Side Panel</title>
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <img src="../icons/icon32.png" alt="Boss Agent" width="24" height="24">
                <span>Boss Agent</span>
            </div>
            <div class="header-actions">
                <button id="clear-chat" title="Clear Chat">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3,6 5,6 21,6"/>
                        <path d="M19,6V20a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6"/>
                        <path d="M8,6V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2V6"/>
                    </svg>
                </button>
                <button id="toggle-cre" title="CRE Deals Analysis" style="background:#000; color:#fff; padding:2px 6px; border-radius:4px; font-size:12px; cursor:pointer;">
                    CRE
                </button>
                <button id="settings-btn" title="Settings">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Status Bar -->
        <div class="status-bar">
            <span class="status" id="status">
                <span class="status-dot"></span>
                <span class="status-text">Connecting...</span>
            </span>
            <span class="tools-count" id="tools-count">Loading tools...</span>
        </div>

        <!-- Chat Container -->
        <div class="chat-container" id="chat-container">
            <div class="welcome">
                <div class="welcome-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h2>Boss Agent</h2>
                <p>AI-powered financial models and marketing intelligence</p>
                <div class="quick-prompts">
                    <button class="quick-prompt" data-prompt="Predict LTV for a customer">Predict LTV</button>
                    <button class="quick-prompt" data-prompt="Optimize my Target ROAS">Optimize ROAS</button>
                    <button class="quick-prompt" data-prompt="Estimate CATE for treatment effect">Estimate CATE</button>
                    <button class="quick-prompt" data-prompt="Show me the top uplift cohort">Export Uplift Cohort</button>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="message-input" placeholder="Ask Boss Agent about financial models, LTV, CATE, attribution..." rows="1"></textarea>
                <div class="input-actions">
                    <button id="tools-btn" title="Browse Tools">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                        </svg>
                    </button>
                    <button id="send-btn" class="send-btn" title="Send">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Tools Panel (Slide-in) -->
    <div class="tools-panel" id="tools-panel">
        <div class="tools-header">
            <h3>Financial Tools</h3>
            <button id="close-tools" class="close-btn">&times;</button>
        </div>
        <div class="tools-search">
            <input type="text" id="tools-search" placeholder="Search tools...">
        </div>
        <div class="tools-list" id="tools-list">
            <!-- Tools will be populated here -->
        </div>
    </div>

    <!-- CRE Panel -->
    <div class="cre-panel" id="cre-panel" style="display:none; position:absolute; top:60px; left:0; right:0; bottom:0; z-index:100; background:white;">
        <iframe title="CRE Deals Analysis" src="cre_sidepanel/sidepanel.html" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <script src="sidepanel.js"></script>
</body>
</html>
